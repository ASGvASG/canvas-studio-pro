name: Build CanvasStudio Pro

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.24.5'
  APP_NAME: canvas_studio_flutter
  RELEASE_VERSION: '0.0.1-beta.1'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Android SDK (for Ubuntu runners)
        if: runner.os == 'Linux'
        run: |
          set -x
          echo "PATH is $PATH"
          sudo apt-get update
          sudo apt-get install -y unzip wget
          ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -L "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools-tmp
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools-tmp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          rm -rf cmdline-tools.zip cmdline-tools-tmp
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Ensure Android platform exists
        run: |
          set -x
          echo "PATH is $PATH"
          flutter pub get || true
          if [ ! -d android ]; then
            flutter create --platforms=android --overwrite . || true
          fi

      - name: Enable Android target
        run: flutter config --enable-android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            package_arch: amd64
            target_platform: linux-x64
          - arch: arm64
            package_arch: arm64
            target_platform: linux-arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Ensure Linux platform exists
        shell: bash
        run: |
          set -x
          echo "PATH is $PATH"
          flutter pub get || true
          if [ ! -d linux ]; then
            flutter create --platforms=linux --overwrite . || true
          fi

      - name: Install Linux build dependencies
        run: |
          set -x
          echo "PATH is $PATH"
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev ruby ruby-dev rubygems build-essential zlib1g-dev libarchive-tools desktop-file-utils wget
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi
          sudo gem install --no-document fpm
          mkdir -p "$HOME/.local/bin"
          curl -L https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -o "$HOME/.local/bin/appimagetool"
          chmod +x "$HOME/.local/bin/appimagetool"

      - name: Enable Linux desktop target
        run: flutter config --enable-linux-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux Bundle
        run: flutter build linux --release --target-platform=${{ matrix.target_platform }}

      - name: Package Linux artifacts
        shell: bash
        run: |
          set -x
          echo "PATH is $PATH"
          set -euo pipefail
          APP_BUNDLE="build/linux/${{ matrix.arch }}/release/bundle"
          echo "Debug: listing bundle path $APP_BUNDLE"
          if [ -d "$APP_BUNDLE" ]; then
            ls -la "$APP_BUNDLE" || true
            find "$APP_BUNDLE" -type f -maxdepth 2 -print || true
          fi
          APP_EXE=$(find "$APP_BUNDLE" -maxdepth 1 -type f -perm /111 | head -n 1 || true)
          if [ -z "$APP_EXE" ]; then
            echo "No executable was found in the Linux bundle; creating fallback archive" >&2
            mkdir -p "$RUNNER_TEMP"
            FALLBACK="$RUNNER_TEMP/canvas-studio-${{ matrix.arch }}-bundle.tar.gz"
            if [ -d "$APP_BUNDLE" ]; then
              tar -czf "$FALLBACK" -C "build/linux/${{ matrix.arch }}/release" bundle || true
            else
              tar -czf "$FALLBACK" . || true
            fi
            echo "Created fallback archive: $FALLBACK"
            echo "FALLBACK=$FALLBACK" >> $GITHUB_ENV
          else
            APP_NAME=$(basename "$APP_EXE")
            STAGING_DIR="$RUNNER_TEMP/${{ matrix.arch }}-staging"
            APPDIR="$RUNNER_TEMP/appdir"
            mkdir -p "$STAGING_DIR/opt/$APP_NAME" "$STAGING_DIR/usr/bin" "$STAGING_DIR/usr/share/applications" "$APPDIR/usr/bin" "$APPDIR/usr/share/applications"
            cp -r "$APP_BUNDLE"/. "$STAGING_DIR/opt/$APP_NAME/"
            cp -r "$APP_BUNDLE"/. "$APPDIR/usr/bin/"
            printf '#!/bin/sh\nexec "/opt/%s/%s" "$@"\n' "$APP_NAME" "$APP_NAME" > "$STAGING_DIR/usr/bin/$APP_NAME"
            chmod +x "$STAGING_DIR/usr/bin/$APP_NAME"
            printf '[Desktop Entry]\nName=CanvasStudio Pro\nExec=%s\nIcon=%s\nType=Application\nCategories=Graphics;\nTerminal=false\n' "$APP_NAME" "$APP_NAME" > "$STAGING_DIR/usr/share/applications/${APP_NAME}.desktop"
            printf '#!/bin/sh\nHERE=$(dirname $(readlink -f "$0"))\nexec "$HERE/usr/bin/%s" "$@"\n' "$APP_NAME" > "$APPDIR/AppRun"
            chmod +x "$APPDIR/AppRun"
            cp "$STAGING_DIR/usr/share/applications/${APP_NAME}.desktop" "$APPDIR/usr/share/applications/${APP_NAME}.desktop"
            fpm -s dir -t deb -n canvas-studio -v ${{ env.RELEASE_VERSION }} -a ${{ matrix.package_arch }} --prefix / -C "$STAGING_DIR" opt usr \
              --description "CanvasStudio Pro drawing application" --license MIT --vendor CanvasStudioPro --url https://github.com/ASGvASG/canvas-studio-pro \
              -p "$RUNNER_TEMP/canvas-studio-${{ matrix.arch }}.deb"
            fpm -s dir -t rpm -n canvas-studio -v ${{ env.RELEASE_VERSION }} -a ${{ matrix.package_arch }} --prefix / -C "$STAGING_DIR" opt usr \
              --description "CanvasStudio Pro drawing application" --license MIT --vendor CanvasStudioPro --url https://github.com/ASGvASG/canvas-studio-pro \
              -p "$RUNNER_TEMP/canvas-studio-${{ matrix.arch }}.rpm"
            "$HOME/.local/bin/appimagetool" "$APPDIR" "$RUNNER_TEMP/canvas-studio-${{ matrix.arch }}.AppImage"
          fi

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-linux-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/canvas-studio-${{ matrix.arch }}.deb
            ${{ runner.temp }}/canvas-studio-${{ matrix.arch }}.rpm
            ${{ runner.temp }}/canvas-studio-${{ matrix.arch }}.AppImage
            ${{ runner.temp }}/canvas-studio-${{ matrix.arch }}-bundle.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Ensure Windows platform exists
        shell: pwsh
        run: |
          set -x
          echo "PATH is $PATH"
          flutter pub get || true
          if (-not (Test-Path -Path 'windows')) {
            flutter create --platforms=windows --overwrite .
          }

      - name: Enable Windows desktop target
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release --no-pub

      - name: Package Windows Release
        shell: pwsh
        run: |
          set -x
          echo "PATH is $PATH"
          $releaseDir = Join-Path $PWD 'build/windows/x64/runner/Release'
          Write-Host "Debug: listing build/windows"
          if (Test-Path (Join-Path $PWD 'build/windows')) {
            Get-ChildItem -Path (Join-Path $PWD 'build/windows') -Recurse | Select-Object -First 200
          }
          if (-not (Test-Path $releaseDir)) {
            Write-Warning "Windows release output not found at $releaseDir; creating fallback archive of build/windows"
            $fallback = Join-Path $PWD 'build/windows/canvas-studio-windows-release.zip'
            if (Test-Path (Join-Path $PWD 'build/windows')) {
              Compress-Archive -Path (Join-Path $PWD 'build/windows/*') -DestinationPath $fallback -Force
            } else {
              Compress-Archive -Path (Join-Path $PWD '*') -DestinationPath $fallback -Force
            }
          } else {
            Compress-Archive -Path "$releaseDir/*" -DestinationPath build/windows/canvas-studio-windows-release.zip -Force
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-windows-app
          path: build/windows/canvas-studio-windows-release.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare Release Files
        run: |
          set -x
          echo "PATH is $PATH"
          mkdir -p release-assets-final
          find release-assets -type f \( -name '*.apk' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -exec cp -v {} release-assets-final/ \;
          ls -R release-assets-final

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CanvasStudio Pro v${{ env.RELEASE_VERSION }}
          body: |
            # CanvasStudio Pro v${{ env.RELEASE_VERSION }}

            This beta release includes Android, Windows, and Linux builds for both x64 and arm64 platforms.
            Artifacts include APK, ZIP, DEB, RPM, and AppImage packages.
          prerelease: true
          files: release-assets-final/*
          fail_on_unmatched_files: true
