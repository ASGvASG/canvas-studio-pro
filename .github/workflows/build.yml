name: Build CanvasStudio Pro (Android, Windows, Linux)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev binutils-aarch64-linux-gnu

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Install Pub Dependencies
        run: flutter pub get

      - name: Build Linux Binary
        run: flutter build linux --release --target-platform=linux-${{ matrix.arch == 'x64' && 'x64' || 'arm64' }}

      - name: Package Release
        run: |
          # Simplified packaging logic for demonstration
          mkdir -p packaging
          tar -czf packaging/canvas-studio-linux-${{ matrix.arch }}.tar.gz -C build/linux/*/release/bundle .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-linux-${{ matrix.arch }}
          path: packaging/canvas-studio-linux-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: flutter build windows --release

      - name: Package Release
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\canvas-studio-windows-release.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-studio-windows-app
          path: build/windows/canvas-studio-windows-release.zip

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CanvasStudio Pro v0.0.1-beta.1
          body: |
            # Release v0.0.1-beta.1
            Initial beta release of CanvasStudio Pro.
          files: |
            canvas-studio-android-apk/app-release.apk
            canvas-studio-linux-x64/canvas-studio-linux-x64.tar.gz
            canvas-studio-linux-arm64/canvas-studio-linux-arm64.tar.gz
            canvas-studio-windows-app/canvas-studio-windows-release.zip
